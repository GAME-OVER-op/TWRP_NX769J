name: Build NX769J Recovery

on:
  workflow_dispatch:
    inputs:
      manifest_url:
        description: "Manifest URL"
        required: true
        default: "https://github.com/minimal-manifest-twrp/platform_manifest_twrp_lineageos.git"
      manifest_branch:
        description: "Manifest branch"
        required: true
        default: "twrp-14.1"
      device_path:
        description: "Device tree install path in source tree"
        required: true
        default: "device/nubia/NX769J"
      lunch_target:
        description: "Lunch target"
        required: true
        default: "twrp_NX769J-eng"
      build_target:
        description: "Make target"
        required: true
        default: "recoveryimage"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show runner info
        run: |
          uname -a
          df -h
          free -h || true

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /usr/local/lib/android || true
          sudo apt-get clean
          df -h

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            adb aria2 bash bc bison build-essential ccache curl flex g++-multilib \
            gcc-multilib git git-lfs gnupg gperf imagemagick jq lib32ncurses-dev \
            lib32readline-dev lib32z1-dev libelf-dev liblz4-tool libncurses-dev \
            libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop openjdk-8-jdk \
            pngcrush python-is-python3 python3 repo rsync schedtool squashfs-tools \
            unzip xsltproc zip zlib1g-dev



      - name: Ensure legacy ncurses compatibility
        run: |
          set -e
          ldconfig -p | grep -E 'libncurses\.so\.6|libtinfo\.so\.6' || true
          ncurses_src="$(ldconfig -p | awk '/libncurses\.so\.6 /{print $NF; exit}')"
          tinfo_src="$(ldconfig -p | awk '/libtinfo\.so\.6 /{print $NF; exit}')"
          [ -n "$ncurses_src" ] || ncurses_src=/lib/x86_64-linux-gnu/libncurses.so.6
          [ -n "$tinfo_src" ] || tinfo_src=/lib/x86_64-linux-gnu/libtinfo.so.6
          test -e "$ncurses_src"
          test -e "$tinfo_src"
          sudo mkdir -p /usr/lib/x86_64-linux-gnu /lib/x86_64-linux-gnu
          sudo ln -sf "$ncurses_src" /usr/lib/x86_64-linux-gnu/libncurses.so.5
          sudo ln -sf "$ncurses_src" /lib/x86_64-linux-gnu/libncurses.so.5
          sudo ln -sf "$tinfo_src" /usr/lib/x86_64-linux-gnu/libtinfo.so.5
          sudo ln -sf "$tinfo_src" /lib/x86_64-linux-gnu/libtinfo.so.5
          ls -l /usr/lib/x86_64-linux-gnu/libncurses.so.5 /usr/lib/x86_64-linux-gnu/libtinfo.so.5 /lib/x86_64-linux-gnu/libncurses.so.5 /lib/x86_64-linux-gnu/libtinfo.so.5

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git lfs install

      - name: Initialize source tree
        run: |
          mkdir -p "$HOME/android"
          cd "$HOME/android"
          repo init -u "${{ github.event.inputs.manifest_url }}" -b "${{ github.event.inputs.manifest_branch }}" --depth=1

      - name: Sync source tree
        run: |
          cd "$HOME/android"
          repo sync -c --no-clone-bundle --no-tags -j4

      - name: Install device tree
        run: |
          cd "$HOME/android"
          mkdir -p "$(dirname "${{ github.event.inputs.device_path }}")"
          rm -rf "${{ github.event.inputs.device_path }}"
          cp -a "$GITHUB_WORKSPACE/device/nubia/NX769J" "${{ github.event.inputs.device_path }}"
          test -f "${{ github.event.inputs.device_path }}/BoardConfig.mk"
          test -f "${{ github.event.inputs.device_path }}/twrp_NX769J.mk"


      - name: Fetch missing legacy sources
        run: |
          cd "$HOME/android"
          if [ ! -d external/libtar ]; then
            git clone --depth=1 -b lineage-16.0 https://github.com/LineageOS/android_external_libtar external/libtar
          fi


      - name: Patch legacy minivold dependency
        run: |
          cd "$HOME/android"
          if [ -f bootable/recovery/Android.mk ]; then
            sed -i '/libminivold_static \/d' bootable/recovery/Android.mk
          fi
          if [ -f bootable/recovery/recovery_cmds.h ]; then
            python3 - <<'EOF'
from pathlib import Path
p=Path('bootable/recovery/recovery_cmds.h')
s=p.read_text()
s=s.replace('int vold_main(int argc, char **argv);','static inline int vold_main(int argc, char **argv) { (void)argc; (void)argv; return 0; }')
p.write_text(s)
EOF
          fi
          grep -n 'libminivold_static\|vold_main' bootable/recovery/Android.mk bootable/recovery/recovery_cmds.h || true

      - name: Start build
        shell: bash
        run: |
          set -eo pipefail
          cd "$HOME/android"
          export JAVA_HOME=/usr/lib/jvm/java-8-openjdk-amd64
          export ANDROID_JAVA_HOME="$JAVA_HOME"
          export ANDROID_JAVA8_HOME="$JAVA_HOME"
          export PATH="$JAVA_HOME/bin:$PATH"
          java -version
          javac -version
          source build/envsetup.sh
          export ALLOW_MISSING_DEPENDENCIES=true
          {
            echo "=== lunch ${GITHUB_EVENT_INPUTS_LUNCH_TARGET:-${{ github.event.inputs.lunch_target }}} ==="
            lunch "${{ github.event.inputs.lunch_target }}"
            echo "=== mka ${{ github.event.inputs.build_target }} ==="
            mka "${{ github.event.inputs.build_target }}" -j"$(nproc 2>/dev/null || echo 4)"
          } 2>&1 | tee "$GITHUB_WORKSPACE/build.log"

      - name: Collect outputs
        if: always()
        run: |
          mkdir -p "$GITHUB_WORKSPACE/out_artifacts"
          if [ -d "$HOME/android" ]; then
            cd "$HOME/android"
            find out/target/product -type f \( -name 'recovery.img' -o -name '*.zip' -o -name 'vendor_boot*.img' -o -name 'boot*.img' \) -exec cp -v {} "$GITHUB_WORKSPACE/out_artifacts/" \; || true
          fi
          cp -v "$GITHUB_WORKSPACE/build.log" "$GITHUB_WORKSPACE/out_artifacts/" || true
          ls -lah "$GITHUB_WORKSPACE/out_artifacts" || true

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nx769j-recovery-${{ github.run_number }}
          path: |
            out_artifacts/*
          if-no-files-found: warn
          retention-days: 14
